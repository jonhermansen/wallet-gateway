apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name}}-wallet-gateway"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: "{{ .Release.Name}}-wallet-gateway"
spec:
  type: ClusterIP
  selector:
    app: "{{ .Release.Name}}-wallet-gateway"
  ports:
    - name: http
      protocol: TCP
      targetPort: http
      port: 8080
