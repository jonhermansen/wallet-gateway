# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: all
release:
  name: wallet-gateway
  namespace: wallet-gateway
tests:
  - it: should be valid manifests
    postRenderer:
      cmd: bash
      args:
        - -c
        - |
          set -euo pipefail

          # cache directory for kubeconform
          mkdir -p cache/kubeconform

          # clone fd/1
          exec {out}<&1

          # tee all stdin back out to fd/1 via the clone, then tee to cat to
          # add line numbers, then tee to kubeconform which will validate the
          # rendered manifest
          tee >(cat >&${out}) | \
          tee >(cat -n >&2) | \
          kubeconform -verbose -strict -cache cache/kubeconform >&2
    asserts:
      - hasDocuments:
          count: 1

  - it: should render a deployment
    set:
      oauthSecrets.OAUTH2_DEVNET_CLIENT_SECRET.secretRef.name: "my-secret"
      oauthSecrets.OAUTH2_DEVNET_CLIENT_SECRET.secretRef.key: "my-key"
    templates:
      - deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BLOCKDAEMON_API_URL
            value: http://localhost:5080/api/cwp/canton
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BLOCKDAEMON_API_KEY
            valueFrom:
              secretKeyRef:
                key: ""
                name: ""
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OAUTH2_DEVNET_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: "my-secret"
                key: "my-key"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: BLOCKDAEMON_CAIP2
  - it: should render BLOCKDAEMON_CAIP2 when caip2 is set
    set:
      signing.blockdaemon.caip2: "canton:devnet"
    templates:
      - deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BLOCKDAEMON_CAIP2
            value: "canton:devnet"
  - it: should render a service
    templates:
      - service.yaml
    asserts:
      - isKind:
          of: Service
  - it: should render a configmap (correctly)
    templates:
      - configmap.yaml
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: data["config.json"]
          value: |
            {
              "bootstrap": {
                "idps": [
                  {
                    "configUrl": "http://oauth.example.com/.well-known/openid-configuration",
                    "id": "idp-devnet",
                    "issuer": "\u003coauth_issuer\u003e",
                    "type": "oauth"
                  },
                  {
                    "id": "idp-local",
                    "issuer": "unsafe-auth",
                    "type": "self_signed"
                  }
                ],
                "networks": [
                  {
                    "adminAuth": {
                      "audience": "\u003coauth_audience\u003e",
                      "clientId": "\u003coauth_admin_client_id\u003e",
                      "clientSecretEnv": "OAUTH2_DEVNET_CLIENT_SECRET",
                      "method": "client_credentials",
                      "scope": "daml_ledger_api"
                    },
                    "auth": {
                      "audience": "\u003coauth_audience\u003e",
                      "clientId": "\u003coauth_user\u003e",
                      "method": "authorization_code",
                      "scope": "openid daml_ledger_api offline_access"
                    },
                    "description": "Connect to Canton DevNet",
                    "id": "devnet",
                    "identityProviderId": "idp-devnet",
                    "ledgerApi": {
                      "baseUrl": "https://devnet.example.com"
                    },
                    "name": "Canton DevNet (example)"
                  },
                  {
                    "adminAuth": {
                      "audience": "\u003clocal_audience\u003e",
                      "clientId": "admin",
                      "clientSecret": "unsafe",
                      "issuer": "unsafe-auth",
                      "method": "self_signed",
                      "scope": "openid daml_ledger_api offline_access"
                    },
                    "auth": {
                      "audience": "\u003clocal_audience\u003e",
                      "clientId": "\u003clocal_user\u003e",
                      "clientSecret": "unsafe",
                      "issuer": "unsafe-auth",
                      "method": "self_signed",
                      "scope": "openid daml_ledger_api offline_access"
                    },
                    "description": "Connect to a local self-signed network",
                    "id": "local",
                    "identityProviderId": "idp-local",
                    "ledgerApi": {
                      "baseUrl": "http://localhost:3975"
                    },
                    "name": "Local (self-signed example)"
                  }
                ]
              },
              "kernel": {
                "clientType": "remote",
                "id": "remote-da",
                "publicUrl": "https://wallet.example.com"
              },
              "server": {
                "allowedOrigins": "*",
                "dappPath": "/api/v0/dapp",
                "port": 3030,
                "requestRateLimit": 100,
                "requestSizeLimit": "5mb",
                "trustProxy": true,
                "userPath": "/api/v0/user"
              },
              "signingStore": {
                "connection": {
                  "database": "signing_store.sqlite",
                  "type": "sqlite"
                }
              },
              "store": {
                "connection": {
                  "database": "store.sqlite",
                  "type": "sqlite"
                }
              }
            }
