apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name}}-splice-portfolio"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: "{{ .Release.Name}}-splice-portfolio"
spec:
  type: ClusterIP
  selector:
    app: "{{ .Release.Name}}-splice-portfolio"
  ports:
    - name: http
      protocol: TCP
      targetPort: http
      port: 80
