name: splice-portfolio
on:
  - push

defaults:
  run:
    shell: nix-shell --run "exec bash -euo pipefail {0}"

jobs:
  check:
    runs-on: digital-asset-wallet-gateway
    steps:
      - uses: actions/checkout@v6
      - run: helm unittest charts/splice-portfolio
      - run: ./bin/helm-gen splice-portfolio
      - run: ./.github/scripts/git-dirty-check

  docker-build-and-publish:
    runs-on: digital-asset-wallet-gateway
    permissions:
      contents: read
      packages: write
    needs:
      - check
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate outputs for downstream jobs
      - name: Versions
        id: versions
        uses: ./.github/actions/versions
      - name: Docker Tags
        id: tags
        uses: ./.github/actions/docker-tags
        with:
          name: splice-portfolio
          registry-unstable: ghcr.io/digital-asset/splice-portfolio-unstable/docker
          registry-stable: ghcr.io/digital-asset/splice-portfolio/docker

      # Setup buildx for multi-platform
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Publish the docker image
      - name: Docker Build and Publish
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile.splice-portfolio
          # Always use the stable version to pull down the npm package
          build-args: version=${{ steps.version.outputs.version }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}

  helm-publish:
    runs-on: digital-asset-wallet-gateway
    permissions:
      contents: read
      packages: write
    needs:
      - check
    steps:
      - uses: actions/checkout@v6

      - name: Helm Build and Publish
        uses: ./.github/actions/helm-build-push
        with:
          chart: charts/splice-portfolio
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry-unstable: ghcr.io/digital-asset/splice-portfolio-unstable/helm
          registry-stable: ghcr.io/digital-asset/splice-portfolio/helm
