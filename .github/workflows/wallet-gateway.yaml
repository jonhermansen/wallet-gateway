name: wallet-gateway
on:
  - push

defaults:
  run:
    shell: nix-shell --run "exec bash -euo pipefail {0}"

jobs:
  check:
    runs-on: digital-asset-wallet-gateway
    steps:
      - uses: actions/checkout@v6
      - run: helm unittest apps/wallet-gateway/chart
      - run: ./bin/helm-gen wallet-gateway
      - run: ./.github/scripts/git-dirty-check

  docker-build-and-publish:
    runs-on: digital-asset-wallet-gateway
    permissions:
      contents: read
      packages: write
    needs:
      - check
    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate outputs for downstream jobs
      - name: Versions
        id: versions
        uses: ./.github/actions/versions
        with:
          name: wallet-gateway
      - name: Docker Tags
        id: tags
        uses: ./.github/actions/docker-tags
        with:
          name: wallet-gateway
          registry-unstable: ghcr.io/digital-asset/wallet-gateway-unstable/docker
          registry-stable: ghcr.io/digital-asset/wallet-gateway/docker

        # Build first for testing (no publish): https://docs.docker.com/build/ci/github-actions/test-before-push/
      - name: Build and export to Docker
        uses: docker/build-push-action@v6
        id: docker-export
        with:
          file: ./apps/wallet-gateway/Dockerfile
          # Always use the stable version to pull down the npm package
          build-args: version=${{ steps.versions.outputs.stable }}
          load: true

      - name: Test container initializes successfully
        run: ./bin/test-container-init.sh ${{ steps.versions.outputs.stable }} ${{ steps.docker-export.outputs.imageid }}

      # Setup buildx for multi-platform
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Actually publish the docker image
      - name: Docker Build and Publish
        uses: docker/build-push-action@v6
        with:
          file: ./apps/wallet-gateway/Dockerfile
          # Always use the stable version to pull down the npm package
          build-args: version=${{ steps.versions.outputs.stable }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}

  helm-publish:
    runs-on: digital-asset-wallet-gateway
    permissions:
      contents: read
      packages: write
    needs:
      - check
    steps:
      - uses: actions/checkout@v6

      - name: Helm Build and Publish
        uses: ./.github/actions/helm-build-push
        with:
          chart: apps/wallet-gateway/chart
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry-unstable: ghcr.io/digital-asset/wallet-gateway-unstable/helm
          registry-stable: ghcr.io/digital-asset/wallet-gateway/helm
